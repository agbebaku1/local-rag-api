services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama-pull:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until ollama list > /dev/null 2>&1; do sleep 2; done
        ollama pull llama3.1
        ollama pull nomic-embed-text
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/data
      - CHROMA_PORT=8000
    volumes:
      - chroma-data:/data

  rag-app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=chroma
      - RAG_CHROMA_PORT=8000
    depends_on:
      - ollama
      - chroma

volumes:
  ollama-data:
  chroma-data:
