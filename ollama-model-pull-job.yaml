apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-model-pull-v2
spec:
  template:
    spec:
      containers:
      - name: model-puller
        image: ollama/ollama:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            ollama pull llama3 &&
            ollama pull nomic-embed-text &&
            ollama pull llama3.1
        env:
        - name: OLLAMA_HOST
          value: "http://ollama:11434"
      restartPolicy: OnFailure
